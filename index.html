<!DOCTYPE html>
<html>
<head>
    <title>UniApp Dashboard</title>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* Japan Background */
        .bg {
            position: fixed;
            width: 110%;
            height: 110%;
            top: -5%;
            left: -5%;
            background: url('https://images.unsplash.com/photo-1490806843957-31f4c9a91c65') no-repeat center center/cover;
            animation: zoomEffect 20s infinite alternate ease-in-out;
            z-index: -1;
            filter: brightness(0.6);
        }

        @keyframes zoomEffect {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* Layout */
        .dashboard {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar li {
            padding: 12px;
            margin: 10px 0;
            cursor: pointer;
            border-radius: 8px;
        }

        .sidebar li:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Main */
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .search-box {
            margin-bottom: 30px;
        }

        .search-box input {
            padding: 12px;
            width: 300px;
            border-radius: 6px;
            border: none;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
        }

        .card {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .card img {
            width: 45px;
        }

        .card button {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            background: black;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="bg"></div>

<div class="dashboard">

    <div class="sidebar">
        <h2>🌸 UniApp</h2>
        <p id="welcomeUser"></p>

        <ul>
            <li onclick="filterApps('All')">All Apps</li>
            <li onclick="filterApps('Social')">Social</li>
            <li onclick="filterApps('Shopping')">Shopping</li>
            <li onclick="filterApps('Work')">Work</li>
            <li onclick="filterApps('Entertainment')">Entertainment</li>
            <li onclick="logout()" style="color:red;">Logout</li>
        </ul>
    </div>

    <div class="main">
        <div class="search-box">
            <input type="text" id="search" placeholder="Search App..." onkeyup="searchApp()">
        </div>

        <div class="grid" id="apps"></div>
    </div>

</div>

<script>

/* ================= LOGIN PROTECTION ================= */
if(localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
}

/* ================= WELCOME USER ================= */
document.getElementById("welcomeUser").innerText =
    "Welcome, " + localStorage.getItem("currentUser");

/* ================= APPS DATA ================= */
let apps = [
    { name: "YouTube", category: "Entertainment", url: "https://www.youtube.com", icon: "https://cdn-icons-png.flaticon.com/512/1384/1384060.png" },
    { name: "Amazon", category: "Shopping", url: "https://www.amazon.in", icon: "https://cdn-icons-png.flaticon.com/512/732/732229.png" },
    { name: "Instagram", category: "Social", url: "https://www.instagram.com", icon: "https://cdn-icons-png.flaticon.com/512/2111/2111463.png" },
    { name: "Google", category: "Work", url: "https://www.google.com", icon: "https://cdn-icons-png.flaticon.com/512/300/300221.png" },
    { name: "Netflix", category: "Entertainment", url: "https://www.netflix.com", icon: "https://cdn-icons-png.flaticon.com/512/5977/5977590.png" }
];

/* ================= DISPLAY APPS ================= */
function displayApps(list = apps) {
    let container = document.getElementById("apps");
    container.innerHTML = "";

    list.forEach(app => {
        container.innerHTML += `
            <div class="card">
                <img src="${app.icon}">
                <h3>${app.name}</h3>
                <button onclick="window.open('${app.url}','_blank')">Open</button>
            </div>
        `;
    });
}

/* ================= FILTER ================= */
function filterApps(category) {
    if(category === "All") {
        displayApps(apps);
    } else {
        displayApps(apps.filter(app => app.category === category));
    }
}

/* ================= SEARCH ================= */
function searchApp() {
    let value = document.getElementById("search").value.toLowerCase();
    displayApps(apps.filter(app =>
        app.name.toLowerCase().includes(value)
    ));
}

/* ================= LOGOUT ================= */
function logout() {
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
}

/* Initialize */
displayApps();

</script>

</body>
</html>
