<!DOCTYPE html>
<html>
<head>
<title>UniApp Login</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#1e3a8a,#0f172a);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.login-box{
    background:#1e293b;
    padding:40px;
    border-radius:12px;
    width:330px;
    text-align:center;
}

.login-box h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:6px;
}

.password-box{
    position:relative;
}

.password-box span{
    position:absolute;
    right:10px;
    top:14px;
    cursor:pointer;
}

button{
    width:100%;
    padding:12px;
    background:#22c55e;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#16a34a;
}

.remember{
    display:flex;
    align-items:center;
    font-size:14px;
    margin:5px 0 15px;
}

.remember input{
    width:auto;
    margin-right:6px;
}

a{
    color:#60a5fa;
    text-decoration:none;
}

.error{
    color:#f87171;
    font-size:14px;
}

</style>
</head>

<body>

<div class="login-box">

<h2>🌸 UniApp Login</h2>

<div class="error" id="errorMsg"></div>

<input type="text" id="username" placeholder="Username">

<div class="password-box">
<input type="password" id="password" placeholder="Password">
<span onclick="togglePassword()">👁</span>
</div>

<div class="remember">
<input type="checkbox" id="remember"> Remember Me
</div>

<button onclick="login()" id="loginBtn">Login</button>

<p style="margin-top:15px">
Don't have account?
<a href="register.html">Register</a>
</p>

</div>

<script>

/* show hide password */

function togglePassword(){
    let pass=document.getElementById("password");

    if(pass.type==="password"){
        pass.type="text";
    }else{
        pass.type="password";
    }
}

/* login */

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

let error=document.getElementById("errorMsg");
let button=document.getElementById("loginBtn");

error.innerText="";

if(username==="" || password===""){
error.innerText="Please enter username and password";
return;
}

button.innerText="Logging in...";
button.disabled=true;

fetch("http://localhost:8080/api/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username:username,
password:password
})

})
.then(res=>res.json())

.then(data=>{

button.innerText="Login";
button.disabled=false;

if(data && data.username){

localStorage.setItem("loggedIn","true");
localStorage.setItem("currentUser",data.username);

if(document.getElementById("remember").checked){
localStorage.setItem("rememberUser",data.username);
}

window.location.href="index.html";

}else{

error.innerText="Invalid username or password";

}

})

.catch(err=>{

button.innerText="Login";
button.disabled=false;

error.innerText="Server connection error";

console.log(err);

});

}

/* enter key login */

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){
login();
}

});

/* remember user */

window.onload=function(){

let savedUser=localStorage.getItem("rememberUser");

if(savedUser){
document.getElementById("username").value=savedUser;
document.getElementById("remember").checked=true;
}

}

</script>

</body>
</html>
