<!DOCTYPE html>
<html>
<head>
    <title>Login - UniApp</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:#1e293b;
            padding:40px;
            border-radius:12px;
            width:320px;
            text-align:center;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:12px;
            background:#22c55e;
            border:none;
            border-radius:6px;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#16a34a;
        }

        a{
            color:#60a5fa;
            text-decoration:none;
        }
    </style>

</head>

<body>

<div class="login-box">

    <h2>🌸 UniApp Login</h2>

    <input type="text" id="username" placeholder="Username">

    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p>Don't have account?  
        <a href="register.html">Register</a>
    </p>

</div>

<script>

function login(){

    let username=document.getElementById("username").value;
    let password=document.getElementById("password").value;

    fetch("http://localhost:8080/api/login",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            username:username,
            password:password
        })
    })
    .then(res=>res.json())
    .then(data=>{

        if(data && data.username){

            localStorage.setItem("loggedIn","true");
            localStorage.setItem("currentUser",data.username);

            window.location.href="index.html";

        }else{

            alert("Invalid username or password");

        }

    })
    .catch(err=>{
        alert("Server not running or connection error");
        console.log(err);
    });

}

</script>

</body>
</html>
